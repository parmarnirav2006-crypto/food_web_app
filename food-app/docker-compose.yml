version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: food-app-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: food-app-server
    restart: unless-stopped
    env_file:
      - ./server/.env
    ports:
      - '5000:5000'
    depends_on:
      - mongo

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: food-app-client
    restart: unless-stopped
    ports:
      - '5173:5173'
    depends_on:
      - server

volumes:
  mongo-data:
